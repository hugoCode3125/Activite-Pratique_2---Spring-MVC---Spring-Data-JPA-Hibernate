<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="layout1"  >
<head>
  <meta charset="UTF-8">
  <title>New Product</title>
  <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
</head>
<body>
<div class="p-3" layout:fragment="content" >
  <form th:action="@{/admin/saveProduct}" th:object="${product}" method="post">
    <div>
      <input type="hidden" class="form-control"  th:field="*{id}">
    </div>
    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" type="text" th:field="*{name}">
      <span class="text-danger" th:errors="*{name}"></span>
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" type="text" th:field="*{price}">
      <span class="text-danger" th:errors="*{price}"></span>
    </div>

    <div class="mb-3">
      <label class="form-label">Quantity</label>
      <input class="form-control" type="text" th:field="*{quantity}">
      <span class="text-danger" th:errors="*{quantity}"></span>
    </div>

    <button class="btn btn-primary" type="submit">Save</button>
  </form>
</div>>

</body>
</html>

<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz"
      layout:decorate="~{layout1}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" type="text/css" href="/webjars/bootstrap/5.3.5/css/bootstrap.min.css">
</head>

<body>

<div class="p-3" layout:fragment="content">

    <div>
        <a class="btn btn-primary" th:href="@{/admin/newProduct}" sec:authorize="hasRole('ADMIN')">Add New Product</a>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>ID</th>
            <th>NAME</th>
            <th>PRICE</th>
            <th>QUANTITY</th>
            <th>ACTION</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p:${productList}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.name}"></td>
            <td th:text="${p.price}"></td>
            <td th:text="${p.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <form th:action="@{/admin/delete(id=${p.id})}" method="post">
                    <button class="btn btn-danger" th:action="">Delete</button>
                </form>
            </td>
            <td>

                <a class="btn btn-sm btn-warning"
                   th:href="@{/admin/editProduct(id=${p.id})}"
                    sec:authorize="hasRole('ADMIN')">
                    Edit
                </a>

            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
